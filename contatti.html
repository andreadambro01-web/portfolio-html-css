<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contattami - Andrea D'Ambrosio</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personale -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="img/favicon.ico">
</head>

<body>

<!-- Menu sticky -->
<header class="menu sticky-top bg-primary py-2">
    <nav class="container d-flex justify-content-start">
        <a href="index.html" class="text-white text-decoration-none mx-3 fw-bold">Home</a>
        <a href="cv.html" class="text-white text-decoration-none mx-3 fw-bold">CV</a>
        <a href="contatti.html" class="text-white text-decoration-none mx-3 fw-bold">Contattami</a>
    </nav>
</header>

<!-- Sezione contatti -->
<section class="contact">
    <div class="container my-5">

        <h1 class="mb-4">Contattami</h1>

        <form>

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
                <label for="messaggio" class="form-label">Messaggio</label>
                <textarea id="messaggio" class="form-control" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Invia</button>

        </form>

    </div>
</section>

<!-- Footer -->
<footer class="bg-primary text-white py-3">
    <div class="container">
        &copy; 2026 Andrea D'Ambrosio
    </div>
</footer>

</body>
</html>
